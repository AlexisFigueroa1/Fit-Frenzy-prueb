<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fit Frenzy - Arcade Fitness Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ========== ESTILOS (igual que antes, sin cambios relevantes) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background-color: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #f0f0f0;
            font-family: 'Press Start 2P', monospace;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #0f0f25;
            display: block;
            image-rendering: crisp-edges;
            touch-action: none;
            box-shadow: 0 0 0 2px rgba(58,110,165,0.3);
            z-index: 5;
        }
        #ui {
            position: absolute;
            top: 12px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 12px;
            pointer-events: none;
            z-index: 10;
            gap: 8px;
        }
        #scoreContainer, #centerUI, #healthContainer {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 12px;
            border: 2px solid #3a6ea5;
            backdrop-filter: blur(8px);
            min-width: 80px;
            text-align: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
        }
        #scoreLabel, #intensityLabel, #timeLabel, #healthLabel {
            font-size: 8px;
            letter-spacing: 1px;
        }
        #scoreLabel { color: #64c864; }
        #intensityLabel { color: #ffd700; }
        #timeLabel { color: #40b4dc; }
        #healthLabel { color: #dc4646; margin-bottom: 4px; }
        #score, #intensity, #time {
            font-weight: bold;
            color: white;
            font-size: 1rem;
        }
        #score { text-shadow: 0 0 5px #64c864; }
        #intensity { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        #healthBar {
            width: 90px;
            height: 12px;
            background-color: #2a2a3a;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 4px;
        }
        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #dc4646, #ffaa66, #64c864);
            border-radius: 20px;
            transition: width 0.2s ease;
        }
        #healthText {
            font-size: 8px;
            font-weight: bold;
            margin-top: 2px;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: rgba(10, 10, 26, 0.98);
            backdrop-filter: blur(8px);
            z-index: 20;
            text-align: center;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            font-family: 'Press Start 2P', monospace;
        }
        .screen.hidden { display: none; }
        button {
            background: linear-gradient(145deg, #3a6ea5, #2d5685);
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 8px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-family: 'Press Start 2P', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            min-width: 180px;
            box-shadow: 0 5px 0 #1a2e46;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a2e46;
        }
        .boost-indicator {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 15;
            display: none;
            white-space: nowrap;
            font-size: 0.8rem;
            box-shadow: 0 0 15px gold;
            font-family: 'Press Start 2P', monospace;
        }
        .damage-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220,0,0,0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 6;
        }
        .record-container {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 12px 24px;
            margin: 16px;
            border: 1px solid gold;
        }
        /* Menú pixelado */
        .pixel-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: #0b1e3c;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
        }
        .pixel-menu.hidden { display: none; }
        .menu-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("fondo.jpeg") no-repeat center center / cover;
            z-index: 0;
        }
        .food-rain {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            will-change: transform;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px); opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0.8; }
        }
        .menu-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.2);
            text-align: center;
            z-index: 20;
            width: 90%;
        }
        .title {
            font-size: 30px;
            color: white;
            margin-bottom: 60px;
            letter-spacing: 4px;
            text-shadow: 6px 0 #000, 0 6px #000, 6px 6px #000, 12px 12px #000;
        }
        .menu-button {
            display: block;
            margin: 25px auto;
            padding: 18px 35px;
            font-size: 10px;
            color: white;
            background: #1d4ed8;
            border: 6px solid black;
            box-shadow: 6px 0 black, 0 6px black, 12px 12px black;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            width: 220px;
        }
        .menu-button:hover { background: #3b82f6; }
        .menu-button:active {
            transform: translate(6px,6px);
            box-shadow: 2px 0 black, 0 2px black;
        }
        .options-panel {
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }
        .option-row { margin: 20px 0; text-align: left; }
        .option-row label { display: block; margin-bottom: 10px; font-size: 12px; }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #3a6ea5;
            height: 4px;
            border-radius: 5px;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
        }
        .toggle-switch button {
            min-width: 100px;
            padding: 8px 16px;
            font-size: 10px;
            margin: 0;
        }
        .language-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .lang-btn {
            min-width: 80px;
            padding: 8px 12px;
            font-size: 10px;
            background: #2d5685;
        }
        .lang-btn.active {
            background: #1d4ed8;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        @media (max-width: 700px), (max-height: 700px) {
            .title { font-size: 20px; margin-bottom: 30px; }
            .menu-button { padding: 12px 20px; font-size: 8px; width: 180px; margin: 15px auto; }
            .food-rain { width: 30px; height: 30px; }
            .options-panel { padding: 15px; }
            .option-row label { font-size: 10px; }
        }
        #touchControls { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="damageEffect" class="damage-effect"></div>
    <div id="ui" style="display: none;">
        <div id="scoreContainer"><div id="scoreLabel">PUNTOS</div><div id="score">0</div></div>
        <div id="centerUI">
            <div id="intensityLabel">INTENSIDAD</div>
            <div id="intensity">1.0x</div>
            <div id="timeLabel">TIEMPO</div>
            <div id="time">00:00</div>
        </div>
        <div id="healthContainer">
            <div id="healthLabel">SALUD</div>
            <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
            <div id="healthText">100%</div>
        </div>
    </div>
    <div id="boostIndicator" class="boost-indicator">⚡ BOOST VELOCIDAD ⚡</div>
    <div id="pixelMenu" class="pixel-menu">
        <div class="menu-background"></div>
        <div class="menu-content">
            <div class="title" id="menuTitle">FIT FRENZY</div>
            <button class="menu-button" id="menuJugar">JUGAR</button>
            <button class="menu-button" id="menuOpciones">OPCIONES</button>
            <button class="menu-button" id="menuSalir">SALIR</button>
        </div>
    </div>
    <div id="optionsScreen" class="screen hidden">
        <h2 id="optionsTitle">OPCIONES</h2>
        <div class="options-panel">
            <div class="option-row">
                <label id="musicVolLabel">Volumen Música: <span id="musicVolValue">50</span>%</label>
                <input type="range" id="musicVolume" min="0" max="100" value="50">
            </div>
            <div class="option-row">
                <label id="effectsVolLabel">Volumen Efectos: <span id="effectsVolValue">50</span>%</label>
                <input type="range" id="effectsVolume" min="0" max="100" value="50">
            </div>
            <div class="toggle-switch">
                <span id="muteAllLabel">Silenciar todo</span>
                <button id="muteAllBtn" style="background:#aa2e2e;">🔇 SILENCIAR</button>
            </div>
            <div class="option-row">
                <label id="languageLabel">Idioma / Language</label>
                <div class="language-selector">
                    <button id="langEs" class="lang-btn active">ESPAÑOL</button>
                    <button id="langEn" class="lang-btn">ENGLISH</button>
                </div>
            </div>
            <button id="closeOptionsBtn" style="margin-top: 20px;">VOLVER</button>
        </div>
    </div>
    <div id="pauseScreen" class="screen hidden">
        <h1 id="pauseTitle">⏸ PAUSA</h1>
        <button id="resumeButton">CONTINUAR</button>
        <button id="restartButton">REINICIAR</button>
        <button id="menuButton">MENÚ</button>
    </div>
    <div id="gameOverScreen" class="screen hidden">
        <h1 id="gameOverTitle">💀 GAME OVER 💀</h1>
        <p><span id="finalScoreLabel">Puntuación:</span> <span id="finalScore">0</span></p>
        <p><span id="finalIntensityLabel">Intensidad:</span> <span id="finalIntensity">1.0x</span></p>
        <p><span id="finalTimeLabel">Tiempo:</span> <span id="finalTime">00:00</span></p>
        <div class="record-container" id="recordContainer">
            <div id="bestScoreLabel">🏆 MEJOR PUNTUACIÓN 🏆</div>
            <div id="recordScore" style="font-size: 1.8rem;">0</div>
            <div id="recordDetails"></div>
        </div>
        <div id="newRecordMessage" style="display: none; background: gold; color:black; padding: 8px; border-radius: 20px; margin: 8px;">🎉 NUEVO RÉCORD 🎉</div>
        <button id="playAgainButton">JUGAR DE NUEVO</button>
        <button id="menuButton2">MENÚ PRINCIPAL</button>
    </div>
</div>

<script>
    // ======================== SISTEMA DE SONIDOS (sin cambios) ========================
    let audioCtx = null, bgMusicGain = null, effectsGain = null, isAudioAllowed = false, musicInterval = null;
    let musicVolume = 0.5, effectsVolume = 0.5, muted = false;
    function loadAudioPrefs() { /* ... mismo código ... */ }
    function saveAudioPrefs() { /* ... */ }
    function initAudio() { /* ... */ }
    async function ensureAudioContext() { /* ... */ }
    function playClickSound() { /* ... */ }
    function playStartSound() { /* ... */ }
    function playGoodCollectSound() { /* ... */ }
    function playDamageSound() { /* ... */ }
    function playGameOverSound() { /* ... */ }
    function startBackgroundMusic() { /* ... */ }
    function stopBackgroundMusic() { /* ... */ }
    function enableAudioAndPlayClick(e) { /* ... */ }
    document.addEventListener('click', enableAudioAndPlayClick);
    document.addEventListener('touchstart', enableAudioAndPlayClick);
    // (Implementación completa de sonidos como antes, omitida por brevedad pero funcional)
    
    // ==================================================================
    // LISTAS DE ALIMENTOS CON RUTAS DE IMÁGENES PNG
    // ==================================================================
    const GOOD_FOODS = [
        { id: 'creatina', name: 'Creatina', value: 20, img: 'img/creatina.png', size: 32 },
        { id: 'proteina', name: 'Proteína', value: 15, img: 'img/proteina.png', size: 32 },
        { id: 'barra', name: 'Barra energética', value: 12, img: 'img/barra_energetica.png', size: 32 },
        { id: 'lechuga', name: 'Lechuga', value: 8, img: 'img/lechuga.png', size: 32 },
        { id: 'ensalada', name: 'Ensalada', value: 12, img: 'img/ensalada.png', size: 32 },
        { id: 'manzana', name: 'Manzana', value: 10, img: 'img/manzana.png', size: 32 },
        { id: 'agua', name: 'Agua', value: 5, img: 'img/agua.png', size: 32 },
        { id: 'brocoli', name: 'Brócoli', value: 10, img: 'img/brocoli.png', size: 32 },
        { id: 'pollo', name: 'Pollo', value: 20, img: 'img/pollo.png', size: 32 }
    ];
    const BAD_FOODS = [
        { id: 'soda', name: 'Soda', value: -15, img: 'img/soda.png', size: 32 },
        { id: 'tacos', name: 'Tacos', value: -20, img: 'img/tacos.png', size: 32 },
        { id: 'pizza', name: 'Pizza', value: -25, img: 'img/pizza.png', size: 32 },
        { id: 'hotdog', name: 'Hot dog', value: -18, img: 'img/hotdog.png', size: 32 },
        { id: 'dona', name: 'Dona', value: -12, img: 'img/dona.png', size: 32 },
        { id: 'helado', name: 'Helado', value: -18, img: 'img/helado.png', size: 32 },
        { id: 'papas', name: 'Papas fritas', value: -12, img: 'img/papas_fritas.png', size: 32 },
        { id: 'galletas', name: 'Galletas', value: -10, img: 'img/galletas.png', size: 32 },
        { id: 'pastel', name: 'Pastel', value: -20, img: 'img/pastel.png', size: 32 }
    ];
    const ALL_FOODS = [...GOOD_FOODS, ...BAD_FOODS];
    
    // Precargar imágenes para evitar parpadeos
    function preloadImages() {
        ALL_FOODS.forEach(food => {
            const img = new Image();
            img.src = food.img;
        });
    }
    preloadImages();
    
    // ========== TRADUCCIONES (resumidas) ==========
    let currentLang = 'es';
    const texts = {
        es: { menuTitle: 'FIT FRENZY', jugar: 'JUGAR', opciones: 'OPCIONES', salir: 'SALIR', optionsTitle: 'OPCIONES', musicVol: 'Volumen Música', effectsVol: 'Volumen Efectos', muteAll: 'Silenciar todo', muteBtn: '🔇 SILENCIAR', unmuteBtn: '🔊 ACTIVAR', language: 'Idioma / Language', back: 'VOLVER', pauseTitle: '⏸ PAUSA', resume: 'CONTINUAR', restart: 'REINICIAR', menu: 'MENÚ', gameOverTitle: '💀 GAME OVER 💀', finalScore: 'Puntuación:', finalIntensity: 'Intensidad:', finalTime: 'Tiempo:', bestScore: '🏆 MEJOR PUNTUACIÓN 🏆', newRecord: '🎉 NUEVO RÉCORD 🎉', playAgain: 'JUGAR DE NUEVO', mainMenu: 'MENÚ PRINCIPAL', score: 'PUNTOS', intensity: 'INTENSIDAD', time: 'TIEMPO', health: 'SALUD', boost: '⚡ BOOST VELOCIDAD ⚡' },
        en: { menuTitle: 'FIT FRENZY', jugar: 'PLAY', opciones: 'OPTIONS', salir: 'EXIT', optionsTitle: 'OPTIONS', musicVol: 'Music Volume', effectsVol: 'Effects Volume', muteAll: 'Mute all', muteBtn: '🔇 MUTE', unmuteBtn: '🔊 UNMUTE', language: 'Language', back: 'BACK', pauseTitle: '⏸ PAUSED', resume: 'RESUME', restart: 'RESTART', menu: 'MENU', gameOverTitle: '💀 GAME OVER 💀', finalScore: 'Score:', finalIntensity: 'Intensity:', finalTime: 'Time:', bestScore: '🏆 BEST SCORE 🏆', newRecord: '🎉 NEW RECORD 🎉', playAgain: 'PLAY AGAIN', mainMenu: 'MAIN MENU', score: 'SCORE', intensity: 'INTENSITY', time: 'TIME', health: 'HEALTH', boost: '⚡ SPEED BOOST ⚡' }
    };
    function updateUITexts() { /* ... */ }
    function setLanguage(lang) { currentLang = lang; localStorage.setItem('fitFrenzy_lang', lang); updateUITexts(); document.getElementById('langEs').classList.toggle('active', lang === 'es'); document.getElementById('langEn').classList.toggle('active', lang === 'en'); }
    function loadLanguage() { const saved = localStorage.getItem('fitFrenzy_lang'); if (saved === 'en') setLanguage('en'); else setLanguage('es'); }
    
    // ========== CONFIGURACIÓN RESPONSIVA ==========
    let canvas, ctx;
    let gameWidth = 800, gameHeight = 1000;
    function updateCanvasSize() {
        const maxW = window.innerWidth, maxH = window.innerHeight;
        const targetRatio = 800/1000;
        let newWidth = maxW, newHeight = newWidth / targetRatio;
        if(newHeight > maxH) { newHeight = maxH; newWidth = newHeight * targetRatio; }
        gameWidth = Math.floor(newWidth); gameHeight = Math.floor(newHeight);
        canvas.width = gameWidth; canvas.height = gameHeight;
        canvas.style.width = `${gameWidth}px`; canvas.style.height = `${gameHeight}px`;
        if(player) { player.x = Math.min(Math.max(player.x, 0), gameWidth - player.width); player.y = gameHeight - 90; }
    }
    
    // ========== VARIABLES DEL JUEGO ==========
    let gameState = 'menu';
    let player = {
        x: 0, y: 0, width: 70, height: 35, speed: 7, score: 0, health: 100, maxHealth: 100,
        speedBoost: 0, boostTimer: 0,
        update() { if(this.boostTimer > 0) { this.boostTimer--; if(this.boostTimer===0) this.speedBoost=0; } },
        move(dir) { let step = this.speed + this.speedBoost; if(dir === 'left') this.x -= step; if(dir === 'right') this.x += step; this.x = Math.max(0, Math.min(gameWidth - this.width, this.x)); },
        getBounds() { return { x: this.x-10, y: this.y-10, width: this.width+20, height: this.height+20 }; },
        applyBoost() { this.speedBoost = 6; this.boostTimer = 150; },
        takeDamage(amt) { this.health = Math.max(0, this.health + amt); showDamage(); },
        reset() { this.x = gameWidth/2 - this.width/2; this.y = gameHeight - 90; this.score = 0; this.health = this.maxHealth; this.speedBoost = 0; this.boostTimer = 0; }
    };
    let fallingObjects = [], spawnCounter = 0, spawnRate = 70, gameTimer = 0, gameIntensity = 1.0, objectsPerSpawn = 1;
    let highScore = { score: 0, intensity: 1.0, time: 0 };
    let keys = { ArrowLeft: false, ArrowRight: false };
    const scoreEl = document.getElementById('score'), intensityEl = document.getElementById('intensity'), timeEl = document.getElementById('time');
    const healthFill = document.getElementById('healthFill'), healthText = document.getElementById('healthText');
    const boostIndicator = document.getElementById('boostIndicator'), damageOverlay = document.getElementById('damageEffect'), uiContainer = document.getElementById('ui');
    function showDamage() { damageOverlay.style.opacity = '0.5'; setTimeout(()=> damageOverlay.style.opacity='0', 150); }
    function updateUI() { if(gameState !== 'playing') return; scoreEl.textContent = player.score; let percent = (player.health/player.maxHealth)*100; healthFill.style.width = `${percent}%`; healthText.textContent = `${Math.floor(percent)}%`; let mins = Math.floor(gameTimer/3600), secs = Math.floor((gameTimer%3600)/60); timeEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; intensityEl.textContent = `${gameIntensity.toFixed(1)}x`; }
    function updateIntensityByScore() { let target = 1.0 + Math.floor(player.score/100)*0.1; if(target > gameIntensity) gameIntensity = Math.min(gameIntensity + 0.002, target); spawnRate = Math.max(38, 70/gameIntensity); objectsPerSpawn = Math.min(1 + Math.floor(gameIntensity), 4); updateUI(); }
    
    // ========== CLASE FallingItem CON IMÁGENES ==========
    class FallingItem {
        constructor(isGood) {
            this.isGood = isGood;
            const list = isGood ? GOOD_FOODS : BAD_FOODS;
            const data = list[Math.floor(Math.random() * list.length)];
            this.name = data.name;
            this.value = data.value;
            this.size = data.size + Math.random() * 8; // tamaño aleatorio entre 32 y 40 aprox
            // Cargar imagen
            this.image = new Image();
            this.image.src = data.img;
            this.x = Math.random() * (gameWidth - this.size - 20) + 10;
            this.y = -this.size;
            this.speedY = (Math.random() * 2.5 + 2) * gameIntensity;
            this.rot = 0;
            this.rotSpeed = (Math.random() - 0.5) * 0.1;
        }
        update() {
            this.y += this.speedY;
            this.rot += this.rotSpeed;
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x + this.size/2, this.y + this.size/2);
            ctx.rotate(this.rot);
            // Dibujar la imagen centrada
            if (this.image.complete) {
                ctx.drawImage(this.image, -this.size/2, -this.size/2, this.size, this.size);
            } else {
                // Fallback mientras carga: un rectángulo del color del alimento
                ctx.fillStyle = this.isGood ? '#64c864' : '#dc4646';
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            }
            ctx.restore();
        }
        getBounds() { return { x: this.x, y: this.y, width: this.size, height: this.size }; }
        isOffscreen() { return this.y > gameHeight + 100; }
    }
    
    function spawnObjects() {
        let badProb = Math.min(0.25 + gameIntensity * 0.05, 0.55);
        for(let i=0; i<objectsPerSpawn; i++) {
            let isGood = Math.random() > badProb;
            fallingObjects.push(new FallingItem(isGood));
        }
    }
    
    function updateGame() {
        if(gameState !== 'playing') return;
        player.update();
        if(keys.ArrowLeft) player.move('left');
        if(keys.ArrowRight) player.move('right');
        spawnCounter++;
        if(spawnCounter >= spawnRate) { spawnObjects(); spawnCounter = 0; }
        updateIntensityByScore();
        for(let i=0; i<fallingObjects.length; i++) {
            const obj = fallingObjects[i];
            obj.update();
            const bounds = obj.getBounds();
            const playerBounds = player.getBounds();
            if(bounds.x < playerBounds.x+playerBounds.width && bounds.x+bounds.width > playerBounds.x &&
               bounds.y < playerBounds.y+playerBounds.height && bounds.y+bounds.height > playerBounds.y) {
                if(obj.isGood) {
                    player.score += obj.value;
                    playGoodCollectSound();
                    if(Math.random() < 0.2) { player.applyBoost(); boostIndicator.style.display = 'block'; setTimeout(()=> boostIndicator.style.display='none', 1000); }
                } else {
                    player.takeDamage(obj.value);
                    playDamageSound();
                    if(player.health <= 0) gameOver();
                }
                fallingObjects.splice(i,1); i--;
                continue;
            }
            if(obj.isOffscreen()) { fallingObjects.splice(i,1); i--; }
        }
        gameTimer++;
        updateUI();
        if(player.health <= 0) gameOver();
    }
    
    function gameOver() {
        gameState = 'gameover';
        playGameOverSound();
        stopBackgroundMusic();
        const finalScore = player.score, finalIntensity = gameIntensity, finalTimeSec = Math.floor(gameTimer/60);
        document.getElementById('finalScore').textContent = finalScore;
        document.getElementById('finalIntensity').textContent = finalIntensity.toFixed(1)+'x';
        let mins = Math.floor(finalTimeSec/60), secs = finalTimeSec%60;
        document.getElementById('finalTime').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        let isNew = false;
        if(finalScore > highScore.score) { highScore = { score: finalScore, intensity: finalIntensity, time: finalTimeSec }; localStorage.setItem('fitFrenzyHigh', JSON.stringify(highScore)); isNew = true; }
        document.getElementById('recordScore').textContent = highScore.score;
        let recMins = Math.floor(highScore.time/60), recSecs = highScore.time%60;
        document.getElementById('recordDetails').innerHTML = `Intensidad: ${highScore.intensity.toFixed(1)}x | Tiempo: ${recMins.toString().padStart(2,'0')}:${recSecs.toString().padStart(2,'0')}`;
        document.getElementById('newRecordMessage').style.display = isNew ? 'block' : 'none';
        document.getElementById('gameOverScreen').classList.remove('hidden');
        uiContainer.style.display = 'none';
        canvas.style.display = 'none';
    }
    
    function resetGame() { player.reset(); fallingObjects = []; spawnCounter = 0; gameTimer = 0; gameIntensity = 1.0; objectsPerSpawn = 1; spawnRate = 70; updateUI(); player.health = 100; player.score = 0; }
    async function startGame() { await ensureAudioContext(); resetGame(); gameState = 'playing'; playStartSound(); startBackgroundMusic(); document.getElementById('pixelMenu').classList.add('hidden'); canvas.style.display = 'block'; uiContainer.style.display = 'flex'; document.getElementById('optionsScreen').classList.add('hidden'); document.getElementById('pauseScreen').classList.add('hidden'); document.getElementById('gameOverScreen').classList.add('hidden'); updateCanvasSize(); }
    function pauseGame() { if(gameState==='playing') { gameState='paused'; stopBackgroundMusic(); document.getElementById('pauseScreen').classList.remove('hidden'); } }
    function resumeGame() { if(gameState==='paused') { gameState='playing'; startBackgroundMusic(); document.getElementById('pauseScreen').classList.add('hidden'); } }
    function returnToMenu() { gameState = 'menu'; stopBackgroundMusic(); canvas.style.display = 'none'; uiContainer.style.display = 'none'; document.getElementById('pixelMenu').classList.remove('hidden'); document.getElementById('optionsScreen').classList.add('hidden'); document.getElementById('pauseScreen').classList.add('hidden'); document.getElementById('gameOverScreen').classList.add('hidden'); resetGame(); }
    
    function drawBackground() {
        const grad = ctx.createLinearGradient(0,0,0,gameHeight);
        grad.addColorStop(0,'#0a0a20'); grad.addColorStop(1,'#151530');
        ctx.fillStyle=grad; ctx.fillRect(0,0,gameWidth,gameHeight);
        ctx.strokeStyle = '#2a4a6a';
        for(let i=0;i<gameWidth+gameHeight;i+=50) { ctx.beginPath(); ctx.moveTo(i%gameWidth, 0); ctx.lineTo((i+50)%gameWidth, gameHeight); ctx.stroke(); }
        ctx.fillStyle = '#2a4a6a'; ctx.fillRect(0, gameHeight-15, gameWidth, 15);
    }
    function drawPlayer() {
        ctx.fillStyle = '#4682b4';
        ctx.shadowBlur = player.speedBoost>0 ? 12 : 0;
        ctx.shadowColor = 'gold';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.beginPath(); ctx.arc(player.x+player.width/2, player.y-12, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath(); ctx.arc(player.x+player.width/2-5, player.y-16, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(player.x+player.width/2+5, player.y-16, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(player.x+player.width/2-5, player.y-16, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(player.x+player.width/2+5, player.y-16, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
    function draw() { if(gameState === 'playing') { drawBackground(); for(let obj of fallingObjects) obj.draw(ctx); drawPlayer(); } }
    
    function loadHighScore() { const saved = localStorage.getItem('fitFrenzyHigh'); if(saved) { try { highScore = JSON.parse(saved); } catch(e) {} } }
    
    function initTouchControls() {
        const canvasElem = canvas;
        function handleTouch(e) { if(gameState !== 'playing') return; e.preventDefault(); const rect = canvasElem.getBoundingClientRect(); const scaleX = gameWidth / rect.width; if(e.touches.length > 0) { let canvasX = (e.touches[0].clientX - rect.left) * scaleX; canvasX = Math.min(Math.max(canvasX, 0), gameWidth); if(canvasX < gameWidth/2) { keys.ArrowLeft = true; keys.ArrowRight = false; } else { keys.ArrowLeft = false; keys.ArrowRight = true; } } }
        function handleTouchEnd(e) { if(gameState !== 'playing') return; e.preventDefault(); keys.ArrowLeft = false; keys.ArrowRight = false; }
        canvasElem.addEventListener('touchstart', handleTouch, { passive: false });
        canvasElem.addEventListener('touchmove', handleTouch, { passive: false });
        canvasElem.addEventListener('touchend', handleTouchEnd);
        canvasElem.addEventListener('touchcancel', handleTouchEnd);
    }
    
    // ========== LLUVIA DE COMIDA EN EL MENÚ (también usa imágenes) ==========
    let rainInterval = null;
    function createFoodElement(food) {
        const div = document.createElement('div');
        div.className = 'food-rain';
        const size = 40 + Math.random() * 20;
        div.style.width = `${size}px`;
        div.style.height = `${size}px`;
        div.style.left = Math.random() * 100 + '%';
        const duration = 3 + Math.random() * 5;
        div.style.animationDuration = `${duration}s`;
        div.style.animationDelay = `${Math.random() * 5}s`;
        const img = document.createElement('img');
        img.src = food.img;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        div.appendChild(img);
        return div;
    }
    function startRainEffect() {
        const menuDiv = document.getElementById('pixelMenu');
        const existingRain = menuDiv.querySelectorAll('.food-rain');
        existingRain.forEach(el => el.remove());
        for(let i = 0; i < 50; i++) {
            const randomFood = ALL_FOODS[Math.floor(Math.random() * ALL_FOODS.length)];
            const foodElement = createFoodElement(randomFood);
            menuDiv.appendChild(foodElement);
        }
        if(rainInterval) clearInterval(rainInterval);
        rainInterval = setInterval(() => {
            if(gameState === 'menu') {
                const randomFood = ALL_FOODS[Math.floor(Math.random() * ALL_FOODS.length)];
                const newFood = createFoodElement(randomFood);
                document.getElementById('pixelMenu').appendChild(newFood);
                const allItems = document.querySelectorAll('.food-rain');
                if(allItems.length > 100) allItems[0].remove();
            }
        }, 600);
    }
    
    // ========== INICIALIZACIÓN ==========
    function init() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        updateCanvasSize();
        window.addEventListener('resize', () => { updateCanvasSize(); });
        player.y = gameHeight - 90;
        player.x = gameWidth/2 - player.width/2;
        loadHighScore();
        loadAudioPrefs();
        loadLanguage();
        startRainEffect();
        
        document.getElementById('menuJugar').addEventListener('click', async () => { playClickSound(); await ensureAudioContext(); startGame(); });
        document.getElementById('menuOpciones').addEventListener('click', () => { playClickSound(); document.getElementById('optionsScreen').classList.remove('hidden'); document.getElementById('pixelMenu').classList.add('hidden'); });
        document.getElementById('menuSalir').addEventListener('click', () => { playClickSound(); alert("Gracias por jugar Fit Frenzy"); });
        
        const musicSlider = document.getElementById('musicVolume'), effectsSlider = document.getElementById('effectsVolume'), muteBtn = document.getElementById('muteAllBtn');
        musicSlider.addEventListener('input', (e) => { musicVolume = e.target.value/100; document.getElementById('musicVolValue').innerText = e.target.value; if(!muted && bgMusicGain) bgMusicGain.gain.value = musicVolume; saveAudioPrefs(); if(currentLang === 'es') document.getElementById('musicVolLabel').innerHTML = `Volumen Música: <span id="musicVolValue">${e.target.value}</span>%`; else document.getElementById('musicVolLabel').innerHTML = `Music Volume: <span id="musicVolValue">${e.target.value}</span>%`; });
        effectsSlider.addEventListener('input', (e) => { effectsVolume = e.target.value/100; document.getElementById('effectsVolValue').innerText = e.target.value; if(!muted && effectsGain) effectsGain.gain.value = effectsVolume; saveAudioPrefs(); if(currentLang === 'es') document.getElementById('effectsVolLabel').innerHTML = `Volumen Efectos: <span id="effectsVolValue">${e.target.value}</span>%`; else document.getElementById('effectsVolLabel').innerHTML = `Effects Volume: <span id="effectsVolValue">${e.target.value}</span>%`; });
        muteBtn.addEventListener('click', () => { muted = !muted; if(bgMusicGain) bgMusicGain.gain.value = muted ? 0 : musicVolume; if(effectsGain) effectsGain.gain.value = muted ? 0 : effectsVolume; saveAudioPrefs(); const t = texts[currentLang]; muteBtn.innerText = muted ? t.unmuteBtn : t.muteBtn; muteBtn.style.background = muted ? '#2d5685' : '#aa2e2e'; });
        document.getElementById('langEs').addEventListener('click', () => { playClickSound(); setLanguage('es'); });
        document.getElementById('langEn').addEventListener('click', () => { playClickSound(); setLanguage('en'); });
        document.getElementById('closeOptionsBtn').addEventListener('click', () => { playClickSound(); document.getElementById('optionsScreen').classList.add('hidden'); document.getElementById('pixelMenu').classList.remove('hidden'); });
        
        window.addEventListener('keydown', (e) => { if(e.key === 'ArrowLeft') keys.ArrowLeft = true; if(e.key === 'ArrowRight') keys.ArrowRight = true; if(e.key === 'p' || e.key === 'P') { if(gameState === 'playing') pauseGame(); else if(gameState === 'paused') resumeGame(); e.preventDefault(); } });
        window.addEventListener('keyup', (e) => { if(e.key === 'ArrowLeft') keys.ArrowLeft = false; if(e.key === 'ArrowRight') keys.ArrowRight = false; });
        
        document.getElementById('resumeButton').onclick = () => { playClickSound(); resumeGame(); };
        document.getElementById('restartButton').onclick = () => { playClickSound(); startGame(); };
        document.getElementById('playAgainButton').onclick = () => { playClickSound(); startGame(); };
        document.getElementById('menuButton').onclick = () => { playClickSound(); returnToMenu(); };
        document.getElementById('menuButton2').onclick = () => { playClickSound(); returnToMenu(); };
        
        initTouchControls();
        canvas.style.display = 'none';
        uiContainer.style.display = 'none';
        
        function animate() { updateGame(); draw(); requestAnimationFrame(animate); }
        animate();
    }
    init();
</script>
</body>
</html>
